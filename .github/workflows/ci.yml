name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install
        run: pip install httpx pynacl solders pytest ruff
      - name: lint
        run: ruff check lineguard/ --select E9,F63,F7,F82
      - name: unit + reliability tests
        run: pytest -q
      - name: replay integration test
        run: python scripts/integration_replay.py
